<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturno Studio | Hub Operacional</title>
    <!-- Fontes e Estilos mantidos conforme original[cite: 1] -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* ... [O CSS completo do seu arquivo original permanece aqui] ... */
    </style>
</head>
<body data-theme="dark">
    <!-- ... [O HTML do body permanece exatamente igual ao que você enviou] ... -->
    <div id="toast-container"></div>
    <aside class="sidebar">...</aside> <!-- (Mantido original[cite: 1]) -->
    <main class="main-workspace" id="workspace-area"></main>
    <!-- ... (Manter todos os modais iguais ao original[cite: 1]) ... -->

    <script>
        /* --- CONFIGURAÇÃO SUPABASE --- */
        const SUPABASE_URL = 'https://ygomjnnuscczvijcodlc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_CzFf6Cs0NdILtbgohHFBcg_W7gNDec1';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        /* --- DADOS LOCAIS (Mantidos para performance) --- */
        let clients = JSON.parse(localStorage.getItem('sat_final_cli')) || [];
        let tasks = JSON.parse(localStorage.getItem('sat_final_tsk')) || [];
        let freelas = JSON.parse(localStorage.getItem('sat_final_freelas')) || [];
        let meetings = JSON.parse(localStorage.getItem('sat_final_meetings')) || [];
        let team = JSON.parse(localStorage.getItem('sat_final_team')) || [];
        let subs = JSON.parse(localStorage.getItem('sat_final_subs')) || []; 
        let agency = JSON.parse(localStorage.getItem('sat_final_agency')) || { name: 'Saturno Studio', logo: '' };
        
        // ... [Mantém todas as funções de render, utilidades, etc] ...

        /* --- SALVAR DADOS NO SUPABASE --- */
        async function saveData() {
            // Backup Local
            localStorage.setItem('sat_final_cli', JSON.stringify(clients));
            localStorage.setItem('sat_final_tsk', JSON.stringify(tasks));
            localStorage.setItem('sat_final_freelas', JSON.stringify(freelas));
            localStorage.setItem('sat_final_meetings', JSON.stringify(meetings));
            localStorage.setItem('sat_final_team', JSON.stringify(team));
            localStorage.setItem('sat_final_subs', JSON.stringify(subs));
            localStorage.setItem('sat_final_agency', JSON.stringify(agency));
            
            // Sincroniza com Supabase
            const payload = { clients, tasks, freelas, meetings, team, subs, agency };
            const { error } = await supabase
                .from('app_data')
                .upsert({ id: 'hub_operacional', payload: payload });

            if (error) console.error("Erro ao salvar no Supabase: ", error);
            else console.log("Dados sincronizados com Supabase!");

            updateBadges();
            renderSidebar();
            routeView();
        }

        /* --- INICIALIZAÇÃO E TEMPO REAL --- */
        async function initApp() {
            // 1. Carregar dados iniciais
            const { data } = await supabase
                .from('app_data')
                .select('payload')
                .eq('id', 'hub_operacional')
                .single();

            if (data) {
                const d = data.payload;
                clients = d.clients || [];
                tasks = d.tasks || [];
                freelas = d.freelas || [];
                meetings = d.meetings || [];
                team = d.team || [];
                subs = d.subs || [];
                agency = d.agency || { name: 'Saturno Studio', logo: '' };
            }

            // 2. Escutar mudanças em tempo real
            supabase.channel('schema-db-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'app_data' }, payload => {
                    if (payload.new && payload.new.id === 'hub_operacional') {
                        const d = payload.new.payload;
                        clients = d.clients; tasks = d.tasks; freelas = d.freelas; 
                        meetings = d.meetings; team = d.team; subs = d.subs; agency = d.agency;
                        
                        populateTeamSelects();
                        updateBadges();
                        renderSidebar();
                        routeView();
                        showToast("Dados atualizados pela equipe!");
                    }
                })
                .subscribe();

            // 3. Render inicial
            populateTeamSelects();
            updateBadges();
            renderSidebar();
            routeView();
        }
        
        initApp();
    </script>
</body>
</html>
